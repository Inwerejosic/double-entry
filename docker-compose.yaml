services:
  postgres:
    image: postgres:16-alpine
    container_name: ledger_postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ledger_db
    ports:
      - "5432:5432"
    volumes:
      # Running migrations on container startup
      - ./migrations/20260703000000_init_ledger.sql:/docker-entrypoint-initdb.d/init.sql
      # Persistent data storage for PostgreSQL
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ledger_db"]
      interval: 30s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: inwerejosic/double-entry-app:latest
    container_name: double_entry_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/ledger_db
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data: {}