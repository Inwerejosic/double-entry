services:
  postgres:
    image: postgres:16-alpine
    container_name: ledger_postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ledger_db
    ports:
      - "5432:5432"
    volumes:
      # Running migrations on container startup
      - ./migrations/20260703000000_init_ledger.sql:/docker-entrypoint-initdb.d/init.sql
      # Persistent data storage for PostgreSQL
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ledger_db"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: {}