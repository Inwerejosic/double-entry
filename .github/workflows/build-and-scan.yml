name: CI — Build, Trivy Scan and Publish to GHCR

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [ main ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU and Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (load to runner)
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: ghcr.io/${{ github.repository_owner }}/double-entry-app:latest

      - name: Trivy scan image
        # Use the action's default branch to avoid missing-tag errors here.
        # For reproducible CI, replace with a specific release tag (e.g. aquasecurity/trivy-action@v0.56.0).
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/double-entry-app:latest
          format: table
          exit-code: '1'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Push image to GHCR
        if: ${{ success() }}
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/double-entry-app:latest
